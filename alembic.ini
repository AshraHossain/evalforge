# alembic.ini — Alembic migration configuration
#
# WHY ALEMBIC:
#   We never modify the PostgreSQL schema by hand.  Instead, we change
#   db/models.py and run `alembic revision --autogenerate` — Alembic diffs the
#   live DB against the ORM models and writes migration SQL automatically.
#   This makes schema changes reproducible and reversible (alembic downgrade).

[alembic]
script_location = db/migrations
prepend_sys_path = .

# DATABASE_URL is read from .env via env.py — do not hardcode it here.
sqlalchemy.url = postgresql://evalforge:evalforge@localhost:5432/evalforge

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
